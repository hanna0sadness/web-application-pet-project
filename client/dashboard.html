<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <header class="bg-gray-900 text-white p-4 flex flex-col md:flex-row md:justify-between md:items-center gap-3">
        <h1 class="text-lg md:text-xl font-bold text-center">📊 Dashboard</h1>

        <nav id="nav" class="flex flex-col md:flex-row gap-2 md:gap-4">
            <a href="index.html" class="text-center bg-green-500 px-3 py-1 rounded w-full md:w-auto hover:bg-green-600 transition">На головну</a>
        </nav>
    </header>

    <main class="p-4 md:p-6 grid grid-cols-1 lg:grid-cols-4 gap-4 md:gap-6">
        
        <div class="bg-white p-4 rounded-xl shadow">
            <h3 class="font-bold mb-2 text-center">📁 Датасети</h3>
            <ul id="history" class="space-y-2 text-sm"></ul>
        </div>

        <div class="lg:col-span-3 space-y-4 md:space-y-6">

            <div class="bg-white p-4 rounded-xl shadow flex flex-col sm:flex-row gap-3 sm:items-center">
                <input type="file" id="file" class="w-full">
                <button onclick="upload()"
                    class="bg-blue-500 text-white px-4 py-2 rounded w-full sm:w-auto">
                    Upload
                </button>
            </div>

            <div class="bg-white p-4 rounded-xl shadow flex flex-col md:flex-row gap-3">
                
                <select id="columnSelect" class="border p-2 rounded w-full md:w-auto"></select>

                <select id="chartType" class="border p-2 rounded w-full md:w-auto">
                    <option value="bar">Bar</option>
                    <option value="line">Line</option>
                    <option value="pie">Pie</option>
                    <option value="doughnut">Doughnut</option>
                    <option value="radar">Radar</option>
                    <option value="polarArea">Polar Area</option>
                    <option value="scatter">Scatter</option>
                    <option value="bubble">Bubble</option>
                </select>

                <button onclick="updateChart()"
                    class="bg-green-500 text-white px-4 py-2 rounded w-full md:w-auto">
                    Оновити
                </button>
            </div>

            <div class="bg-white p-4 rounded-xl shadow">
                <div class="w-full overflow-auto">
                    <canvas id="chart" class="max-w-full"></canvas>
                </div>

                <div class="mt-5 flex flex-col md:flex-row md:items-center md:justify-between border-t pt-4 gap-3">

                    <div class="text-sm text-gray-500 text-center md:text-left">
                        Експорт та збереження
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">

                        <button onclick="saveChart()" 
                            class="flex items-center justify-center gap-2 bg-purple-500 hover:bg-purple-600 active:scale-95 transition text-white px-4 py-2 rounded-xl shadow w-full sm:w-auto">
                            💾 <span>Зберегти</span>
                        </button>

                        <button onclick="exportPDF()"
                            class="flex items-center justify-center gap-2 bg-red-500 hover:bg-red-600 active:scale-95 transition text-white px-4 py-2 rounded-xl shadow w-full sm:w-auto">
                            📄 <span>PDF</span>
                        </button>

                    </div>

                </div>

                <ul id="savedCharts" class="mt-3 text-sm"></ul>
            </div>
            
            <div class="bg-white p-4 rounded-xl shadow overflow-auto">
                <h3 class="font-bold mb-2 text-center">🔥 Кореляція</h3>
                <div id="heatmap" class="w-full overflow-auto"></div>
            </div>

        </div>

    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
    <script src="js/upload.js"></script>

</body>
</html>
