<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    
    <header class="bg-gray-900 text-white p-4 flex flex-col md:flex-row md:justify-between md:items-center gap-3">
        <h1 class="text-center text-xl font-bold">⚙️ Адмін-панель</h1>

        <nav class="flex flex-col md:flex-row gap-2 md:gap-4">
            <a href="datasets.html" class="text-center bg-green-500 px-3 py-1 rounded w-full md:w-auto hover:underline">Datasets</a>
            <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded w-full md:w-auto">
                Вийти
            </button>
        </nav>
    </header>

    <main class="p-4 md:p-6">

        <div class="mb-6">
            <h2 class="text-xl md:text-2xl font-bold text-center">📊 Dashboard</h2>
            <p class="text-gray-600 text-sm text-center">Огляд системи</p>
        </div>

        <div id="stats" class="
            grid
            grid-cols-1
            sm:grid-cols-2
            md:grid-cols-3
            lg:grid-cols-4
            gap-4 md:gap-6
        "></div>

    </main>

    <script src="js/admin.js"></script>

</body>
</html>
