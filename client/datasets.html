<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Датасети</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    
    <header class="bg-gray-900 text-white p-4 flex flex-col md:flex-row md:justify-between md:items-center gap-3">
        <h1 class="text-center text-xl font-bold">📁 Datasets</h1>

        <nav class="flex flex-col md:flex-row gap-2 md:gap-4">
            <a href="admin.html" class="text-center bg-green-500 px-3 py-1 rounded w-full md:w-auto hover:underline">На головну</a>
        </nav>
    </header>

    <main class="p-4 md:p-6 grid grid-cols-1 lg:grid-cols-4 gap-4 md:gap-6">

        <div class="bg-white p-4 rounded-xl shadow">
            <h3 class="font-bold mb-2 text-center">Список</h3>
            <ul id="datasetList" class="space-y-2 text-sm"></ul>
        </div>

        <div class="lg:col-span-3 space-y-4 md:space-y-6">

            <div id="datasetInfo" class="bg-white p-4 rounded-xl shadow overflow-auto"></div>

            <div class="bg-white p-4 rounded-xl shadow overflow-auto">
                <h3 class="font-bold mb-2 text-center">📊 Аналіз</h3>
                <pre id="analysis" class="text-xs md:text-sm whitespace-pre-wrap"></pre>
            </div>

            <div class="bg-white p-4 rounded-xl shadow overflow-auto">
                <h3 class="font-bold mb-2 text-center">🔥 Кореляція</h3>
                <div id="heatmap" class="w-full overflow-auto"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow">
                <h3 class="font-bold mb-2 text-center">📈 Збережені графіки</h3>
                <div id="visualizations"
                    class="                    
                    grid
                    grid-cols-1
                    sm:grid-cols-2
                    lg:grid-cols-3
                    gap-4
                "></div>
            </div>

        </div>
    </main>

    <script src="js/datasets.js"></script>

</body>
</html>
